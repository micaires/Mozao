<html>
    <style type='text/css'>

        body {
            margin: 0;
        }
                
        #container-imagem {
            position: relative;
            height: 100vh;
            width: 100vw;
            background: url('https://animecorner.me/wp-content/uploads/2022/05/spy-x-fam.png?ezimgfmt=rs%3Adevice%2Frscb21-1');
            background-size: cover;
        }

        .button {
            display: inline-block;
            padding: 15px 25px;
            font-size: 24px;
            cursor: pointer;
            text-align: center;	
            text-decoration: none;
            outline: none;
            color: #fff;
            background-color: #4CAF50;
            border: none;
            border-radius: 15px;
            box-shadow: 0 9px #999;
          }
          
          .button:hover {background-color: #3e8e41}
          
          .button:active {
            background-color: #3e8e41;
            box-shadow: 0 5px #666;

          }
    </style>
    <head>
    <title>Motivos</title>
    <meta charset="utf-8">
    <div id="container-imagem">
        <div style="text-align:center;">
            <td>
                <img style="border-radius:200px;text-align:center; margin-top:50px" src="https://raw.githubusercontent.com/eimmig/Ju/main/home/imagens/fundo.jpeg" width="245" height="430">
            </td>
        </div>
        <br>
        <div style="text-align:center;">
            <button onClick="mostraMotivo()"class="button">Clique</button>
        </div>
    </div>
</head>
</html>
<script>
        function mostraMotivo(){

        var imagem = [6];

        imagem[0] = 'https://raw.githubusercontent.com/eimmig/Ju/main/home/imagens/1.jpeg'
        imagem[1] = 'https://raw.githubusercontent.com/eimmig/Ju/main/home/imagens/2.jpeg'
        imagem[2] = 'https://raw.githubusercontent.com/eimmig/Ju/main/home/imagens/3.jpeg'
        imagem[3] = 'https://raw.githubusercontent.com/eimmig/Ju/main/home/imagens/4.jpeg'
        imagem[4] = 'https://raw.githubusercontent.com/eimmig/Ju/main/home/imagens/5.jpeg'
        imagem[5] = 'https://raw.githubusercontent.com/eimmig/Ju/main/home/imagens/6.jpeg'

        var mensagem = [];

        mensagem[0] = 'Seu Sorriso';
        mensagem[1] = 'Sua Personalidade';
        mensagem[2] = 'Seus Talentos';
        mensagem[3] = 'Você por Completo';
        mensagem[4] = 'Sua Voz';
        mensagem[5] = 'Seus Olhos';
        mensagem[6] = 'Seu Modo de Ser';
        mensagem[7] = 'Seu Cabelo';
        mensagem[8] = 'GOSTOSA FODASE';
        mensagem[9] = 'Como me Trata';
        mensagem[10] = 'Sua Fofura';
        mensagem[11] = 'Como me Faz Feliz';
        mensagem[12] = 'Sua Inteligência';


        var i = getRandomInt(0, 5)
        var j = getRandomInt(0, 11)

        Swal.fire({ 
            title: 'Um motivo para te Amar',
            text: mensagem[j],
            imageUrl: imagem[i],
            imageWidth: 300,
            imageHeight: 400,
          })
    }
    function getRandomInt(min, max) {
        min = Math.ceil(min);
        max = Math.floor(max);
        return Math.floor(Math.random() * (max - min)) + min;
      }
</script>
